<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKOYAMI PHOTO — Portfolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap');

:root {
  --bg: #06030f;
  --text: #e8e0d4;
  --muted: #4a4560;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  overflow: hidden;
  height: 100vh; width: 100vw;
  cursor: none;
}

/* Cursor */
#cursor {
  position:fixed; z-index:9999;
  width:10px; height:10px;
  border:1px solid rgba(220,180,255,0.8);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,background .2s,border-color .2s;
  mix-blend-mode:screen;
}
#cursor.hover { width:36px; height:36px; background:rgba(200,140,255,0.1); border-color:rgba(220,180,255,1); }
#cursor-trail {
  position:fixed; z-index:9998;
  width:3px; height:3px;
  background:rgba(200,160,255,0.5);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* Deep space background */
.bg-layer {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 70% 70% at 50% 50%, #0e0520 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 30%, #1a0830 0%, transparent 50%),
    radial-gradient(ellipse 35% 40% at 80% 70%, #08051a 0%, transparent 50%),
    #06030f;
}
.scanlines {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);
}

/* Main canvas */
#c { position:fixed; inset:0; z-index:2; width:100%; height:100%; display:block; }

/* Header */
header {
  position:fixed; top:0; left:0; right:0; z-index:20;
  padding:28px 48px;
  display:flex; justify-content:space-between; align-items:flex-start;
  background:linear-gradient(180deg,rgba(6,3,15,.9) 0%,transparent 100%);
  pointer-events:none;
}
.logo {
  font-family:'Cinzel',serif;
  font-size:18px; font-weight:300;
  letter-spacing:0.35em;
  color:rgba(220,200,255,0.85);
}
.logo-sub {
  font-size:8px; letter-spacing:0.5em; color:var(--muted);
  text-transform:uppercase; margin-top:5px;
}
.header-right p {
  font-size:8px; letter-spacing:0.3em; color:var(--muted);
  text-transform:uppercase; line-height:2.4; text-align:right;
}
.header-right span { color:rgba(200,160,255,0.8); }

/* Hint */
.hint {
  position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
  z-index:20; text-align:center; pointer-events:none;
  opacity:1; transition:opacity 1.2s;
}
.hint.fade { opacity:0; }
.hint p { font-size:8px; letter-spacing:0.5em; color:var(--muted); text-transform:uppercase; }
.hint-line { width:1px; height:36px; background:linear-gradient(180deg,rgba(180,120,255,.8) 0%,transparent 100%); margin:8px auto 0; animation:hl 2.2s infinite; }
@keyframes hl { 0%,100%{opacity:.15;transform:scaleY(.4);} 50%{opacity:1;transform:scaleY(1);} }

/* Tooltip */
#tooltip {
  position:fixed; z-index:30;
  padding:5px 14px;
  border:1px solid rgba(180,120,255,0.2);
  background:rgba(6,3,15,0.9);
  backdrop-filter:blur(12px);
  font-size:9px; letter-spacing:0.25em;
  color:var(--text); text-transform:uppercase;
  pointer-events:none; opacity:0; transition:opacity .2s;
  white-space:nowrap; border-radius:2px;
}
#tooltip .t-num { color:rgba(200,150,255,0.8); margin-right:8px; }

/* Index */
#idx {
  position:fixed; left:44px; top:50%; transform:translateY(-50%);
  z-index:20; display:flex; flex-direction:column; gap:18px;
}
.ix { display:flex; align-items:center; gap:10px; opacity:.25; transition:opacity .4s; cursor:none; }
.ix.on { opacity:1; }
.ix:hover { opacity:.6; }
.ix-dot { width:5px; height:5px; border-radius:50%; border:1px solid; transition:transform .3s,background .3s; }
.ix.on .ix-dot { transform:scale(2); }
.ix-lbl { font-size:8px; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); }
.ix.on .ix-lbl { color:var(--text); }

/* Gallery */
#gallery {
  position:fixed; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,3,15,0);
  opacity:0; pointer-events:none;
  transition:opacity .55s cubic-bezier(.16,1,.3,1), background .55s;
}
#gallery.open { opacity:1; pointer-events:all; background:rgba(6,3,15,.94); }

.g-inner {
  width:min(920px,92vw);
  transform:translateY(32px) scale(.95);
  opacity:0;
  transition:transform .55s cubic-bezier(.16,1,.3,1),opacity .55s;
}
#gallery.open .g-inner { transform:translateY(0) scale(1); opacity:1; }

.g-head {
  display:flex; justify-content:space-between; align-items:flex-end;
  margin-bottom:18px; padding-bottom:14px;
  border-bottom:1px solid rgba(180,120,255,.1);
}
.g-num { font-size:8px; letter-spacing:.5em; margin-bottom:5px; }
.g-title {
  font-family:'Cinzel',serif;
  font-size:clamp(22px,4vw,46px);
  font-weight:300; line-height:1; letter-spacing:.05em;
}
.g-close {
  background:none; border:1px solid rgba(180,120,255,.25);
  color:var(--text); width:40px; height:40px;
  border-radius:50%; font-size:15px; cursor:none;
  display:flex; align-items:center; justify-content:center;
  transition:border-color .3s,background .3s; flex-shrink:0; margin-left:20px;
}
.g-close:hover { border-color:rgba(200,150,255,.7); background:rgba(180,120,255,.08); }

.g-art {
  width:100%; aspect-ratio:4/3;
  position:relative; overflow:hidden;
  border-radius:2px; border:1px solid rgba(180,120,255,.08);
  background:#06030f;
}
.art-wrap { position:absolute; inset:0; }
.art-img {
  width:100%; height:100%; object-fit:contain;
  display:block; opacity:0; transition:opacity .8s ease;
  background:#06030f;
}
.art-img.on { opacity:1; }
.art-overlay {
  position:absolute; inset:0; pointer-events:none;
  opacity:0; transition:opacity .8s ease;
  mix-blend-mode:color-dodge;
}
.art-overlay.on { opacity:.07; }

.g-foot {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:14px; padding-top:12px;
  border-top:1px solid rgba(255,255,255,.04);
}
.g-tags { display:flex; gap:8px; }
.g-tag {
  padding:3px 10px; border:1px solid; border-radius:1px;
  font-size:8px; letter-spacing:.25em; text-transform:uppercase;
}
.g-desc { font-size:10px; color:var(--muted); line-height:1.8; max-width:360px; text-align:right; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; }

@media(max-width:700px){
  header{padding:14px 18px;}
  #idx{display:none;}
  #hero{left:18px;bottom:80px;}
  #credit{display:none;}
}

/* Hero name block — bottom-left */
#hero {
  position:fixed; left:48px; bottom:56px; z-index:20;
  pointer-events:none;
}
.hero-name {
  font-family:'Cinzel',serif;
  font-size:clamp(36px,6vw,72px);
  font-weight:300;
  letter-spacing:.08em;
  color:rgba(232,224,212,0.92);
  line-height:1;
}
.hero-sub {
  font-size:9px;
  letter-spacing:.55em;
  color:rgba(180,140,255,.6);
  text-transform:uppercase;
  margin-top:6px;
}
.hero-rule {
  width:48px; height:1px;
  background:linear-gradient(90deg,rgba(180,130,255,.6),transparent);
  margin:10px 0;
}
.hero-copy {
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:13px;
  color:rgba(150,130,160,.7);
  line-height:1.7;
  letter-spacing:.03em;
}

/* Bottom-right credit */
#credit {
  position:fixed; right:48px; bottom:40px; z-index:20;
  display:flex; align-items:center; gap:10px;
  pointer-events:none;
  font-size:8px; letter-spacing:.3em;
  color:rgba(100,85,120,.7); text-transform:uppercase;
}
.cr-sep { color:rgba(180,130,255,.4); }
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="scanlines"></div>
<div id="cursor"></div>
<div id="cursor-trail"></div>
<canvas id="c"></canvas>

<header>
  <div>
    <div class="logo">TOKOYAMI PHOTO</div>
    <div class="logo-sub">Photography Portfolio — 2024</div>
  </div>
  <div class="header-right">
    <p>Light &amp; Shadow <span>Photographer</span></p>
    <p>Click fragment to <span>view work</span></p>
  </div>
</header>

<!-- Hero text — sits below header, above canvas -->
<div id="hero">
  <div class="hero-name">常闇</div>
  <div class="hero-sub">TOKOYAMI</div>
  <div class="hero-rule"></div>
  <p class="hero-copy">Capturing the stillness<br>between light and dark</p>
</div>

<!-- Bottom credit -->
<div id="credit">
  <span>Tokyo, Japan</span>
  <span class="cr-sep">—</span>
  <span>Available for commission</span>
</div>

<div id="idx"></div>
<div id="tooltip"><span class="t-num"></span><span class="t-title"></span></div>
<div class="hint" id="hint"><p>Touch the crystal</p><div class="hint-line"></div></div>

<div id="gallery">
  <div class="g-inner">
    <div class="g-head">
      <div>
        <div class="g-num" id="g-num"></div>
        <h2 class="g-title" id="g-title"></h2>
      </div>
      <button class="g-close" id="g-close">✕</button>
    </div>
    <div class="g-art"><div class="art-wrap" id="art-wrap"></div></div>
    <div class="g-foot">
      <div class="g-tags" id="g-tags"></div>
      <p class="g-desc" id="g-desc"></p>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  FRAGMENT DATA — each piece locks into a shared ore
// ═══════════════════════════════════════════════════════
const FRAGS = [
  { id:0, num:'I',   title:'Midnight Forest',
    colorHex:'#c8aaff', color:0xc8aaff, emitHex:'#9955ff', emit:0x9955ff,
    tags:['Landscape','Night','Long Exposure'],
    desc:'Forests swallowed by darkness — long exposures reveal the hidden luminescence of ancient trees.',
    img:'p1.jpg',
    rest: new THREE.Vector3( 0.00,  1.55,  0.05),
    rotRest: new THREE.Euler(0, 0, 0),
    explode: new THREE.Vector3( 0.00,  2.70,  0.30),
  },
  { id:1, num:'II',  title:'Crimson Hour',
    colorHex:'#ff6e8a', color:0xff6e8a, emitHex:'#cc2244', emit:0xcc2244,
    tags:['Portrait','Golden Hour','Film'],
    desc:'The fleeting warmth of dusk — portraits bathed in the final embers of the setting sun.',
    img:'p2.jpg',
    rest: new THREE.Vector3( 1.30,  0.55,  0.10),
    rotRest: new THREE.Euler(0.2, 0.4, 0.1),
    explode: new THREE.Vector3( 2.60,  0.90,  0.50),
  },
  { id:2, num:'III', title:'Urban Geometry',
    colorHex:'#ffe47a', color:0xffe47a, emitHex:'#cc8800', emit:0xcc8800,
    tags:['Architecture','Abstract','City'],
    desc:'Cities as pure form — concrete and glass reduced to intersecting lines of amber light.',
    img:'p3.jpg',
    rest: new THREE.Vector3( 0.85, -1.20, -0.10),
    rotRest: new THREE.Euler(-0.2, 0.3, -0.15),
    explode: new THREE.Vector3( 1.80, -2.40, -0.30),
  },
  { id:3, num:'IV',  title:'Still Water',
    colorHex:'#6effc8', color:0x6effc8, emitHex:'#00bb77', emit:0x00bb77,
    tags:['Nature','Reflection','Minimal'],
    desc:'Perfect stillness mirrored — the world doubled in surfaces too calm to disturb.',
    img:'p4.jpg',
    rest: new THREE.Vector3(-0.85, -1.20,  0.10),
    rotRest: new THREE.Euler(-0.15, -0.35, 0.2),
    explode: new THREE.Vector3(-1.80, -2.40,  0.30),
  },
  { id:4, num:'V',   title:'Frozen Light',
    colorHex:'#7adcff', color:0x7adcff, emitHex:'#0099cc', emit:0x0099cc,
    tags:['Winter','Ice','Blue Hour'],
    desc:'Winter mornings crystallized — breath made visible, light slowed to a glacial frequency.',
    img:'p5.jpg',
    rest: new THREE.Vector3(-1.30,  0.55, -0.10),
    rotRest: new THREE.Euler(0.15, -0.4, -0.1),
    explode: new THREE.Vector3(-2.60,  0.90, -0.50),
  },
  { id:5, num:'VI',  title:'Shadow Study',
    colorHex:'#d4aaff', color:0xd4aaff, emitHex:'#7700cc', emit:0x7700cc,
    tags:['Monochrome','Shadow','Texture'],
    desc:'What light leaves behind — shadow as subject, absence as the most honest form of presence.',
    img:'p6.jpg',
    rest: new THREE.Vector3( 0.00,  0.00,  0.00),
    rotRest: new THREE.Euler(0, 0, 0),
    explode: new THREE.Vector3( 0.00,  0.00,  1.80),
  },
];

// ═══════════════════════════════════════════════════════
//  CURSOR
// ═══════════════════════════════════════════════════════
const curEl = document.getElementById('cursor');
const trlEl = document.getElementById('cursor-trail');
let mx=0,my=0,tx=0,ty=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  curEl.style.left=mx+'px'; curEl.style.top=my+'px';
});
(function tloop(){
  tx+=(mx-tx)*.1; ty+=(my-ty)*.1;
  trlEl.style.left=tx+'px'; trlEl.style.top=ty+'px';
  requestAnimationFrame(tloop);
})();

// ═══════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0,0);
renderer.shadowMap.enabled = false;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(44,innerWidth/innerHeight,.1,100);
camera.position.set(0,0,9);

const ray = new THREE.Raycaster();
const ptr = new THREE.Vector2();

// ═══════════════════════════════════════════════════════
//  SHADER HELPERS
// ═══════════════════════════════════════════════════════
function toV3(hex){
  return new THREE.Vector3(((hex>>16)&255)/255,((hex>>8)&255)/255,(hex&255)/255);
}

// Crystal facet material — refractive inner glow
function crystalMat(color, emit){
  return new THREE.ShaderMaterial({
    uniforms:{
      time:  {value:0},
      gc:    {value:toV3(color)},
      ec:    {value:toV3(emit)},
      hover: {value:0},
      explodeT:{value:0},
    },
    vertexShader:`
      varying vec3 vN,vP,vWP;
      void main(){
        vN  = normalize(normalMatrix*normal);
        vP  = position;
        vWP = (modelMatrix*vec4(position,1.0)).xyz;
        gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0);
      }`,
    fragmentShader:`
      uniform float time,hover,explodeT;
      uniform vec3  gc,ec;
      varying vec3  vN,vP,vWP;
      void main(){
        // Fresnel
        float fr  = pow(1.0-abs(dot(normalize(vN),vec3(0,0,1))),2.0);
        // Internal caustic shimmer
        float cau = 0.5+0.5*sin(time*2.1+vP.x*8.0+vP.y*6.5+vP.z*4.0);
        float cau2= 0.5+0.5*cos(time*1.4+vP.y*9.0-vP.z*7.0);
        float pulse= 0.5+0.5*sin(time*1.2+length(vP)*3.0);
        // Facet shading — dark interior with glowing edges
        vec3 dark  = vec3(0.02,0.01,0.04);
        vec3 rimCol= mix(gc,ec,0.4+0.4*cau);
        vec3 col   = mix(dark, rimCol, fr*(.85+.15*hover));
        // Inner light leaking through faces
        float inner= pow(cau*cau2,1.5)*0.5*pulse;
        col += ec*inner*(0.6+0.4*hover);
        // Hover brightening
        col += gc*0.18*hover*pulse;
        // Explode glow
        col += ec*explodeT*0.3;
        float alpha= 0.7+fr*0.3+hover*.05;
        gl_FragColor=vec4(col,alpha);
      }`,
    transparent:true,
    side:THREE.DoubleSide,
  });
}

// Edge glow wireframe
function edgeMat(color){
  return new THREE.ShaderMaterial({
    uniforms:{
      time:{value:0}, gc:{value:toV3(color)}, hover:{value:0}, explodeT:{value:0},
    },
    vertexShader:`varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`
      uniform float time,hover,explodeT; uniform vec3 gc; varying vec3 vP;
      void main(){
        float fl=.4+.4*sin(time*3.0+vP.x*9.0+vP.y*7.0);
        float a=(.2+.25*hover+.15*explodeT)*fl;
        gl_FragColor=vec4(gc,a);
      }`,
    transparent:true, wireframe:true,
  });
}

// Gap light between fragments — additive bloom plane
function gapMat(cA,cB){
  return new THREE.ShaderMaterial({
    uniforms:{
      time:{value:0}, ca:{value:toV3(cA)}, cb:{value:toV3(cB)},
    },
    vertexShader:`varying vec2 vUV; void main(){ vUV=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`
      uniform float time; uniform vec3 ca,cb; varying vec2 vUV;
      void main(){
        vec2 uv=vUV-.5; float d=length(uv);
        float pu=.5+.5*sin(time*2.3+d*6.0);
        float pu2=.5+.5*cos(time*1.7);
        float a=smoothstep(.5,.0,d)*(.7+.3*pu)*pu2;
        vec3 col=mix(ca,cb,pu*.6+.2);
        gl_FragColor=vec4(col,a);
      }`,
    transparent:true, depthWrite:false,
    blending:THREE.AdditiveBlending, side:THREE.DoubleSide,
  });
}

// ═══════════════════════════════════════════════════════
//  BUILD CRYSTAL GEOMETRY — convex shard shapes
//  Each fragment is a unique irregular polyhedron that
//  visually "slots" into its neighbor
// ═══════════════════════════════════════════════════════
function shardGeo(seed, scale){
  // Build an irregular convex hull-like shard using displaced sphere points
  const verts = [];
  const rng = mulberry32(seed);
  // Generate control points on a sphere, then nudge asymmetrically
  const N = 14 + Math.floor(rng()*6);
  for(let i=0;i<N;i++){
    const theta = rng()*Math.PI*2;
    const phi   = Math.acos(2*rng()-1);
    const r     = (.7+rng()*.5)*scale;
    const x = r*Math.sin(phi)*Math.cos(theta);
    const y = r*Math.sin(phi)*Math.sin(theta);
    const z = r*Math.cos(phi);
    // Crystal elongation along Y
    verts.push(new THREE.Vector3(x*.75, y*1.2, z*.75));
  }
  // Force top/bottom tips for shard feel
  verts.push(new THREE.Vector3(0,  scale*1.35, 0));
  verts.push(new THREE.Vector3(0, -scale*1.1,  0));
  return convexGeo(verts);
}

function mulberry32(seed){
  let s=seed*1664525+1013904223|0;
  return function(){ s=Math.imul(s^s>>>15,1|s); s^=s+Math.imul(s^s>>>7,61|s); return ((s^s>>>14)>>>0)/4294967296; }
}

function convexGeo(points){
  // Approximate convex hull via indexed triangle fan from centroid
  // Using IcosahedronGeometry subdivided and projected onto convex hull approx
  const geo = new THREE.BufferGeometry();
  const positions = [];
  const normals   = [];

  // Simple approach: use DelaunayTriangulation-like subdivision of point cloud
  // For visual quality, we project icosphere verts onto nearest input point
  const sphere = new THREE.IcosahedronGeometry(1,1);
  const spVerts = sphere.attributes.position;

  for(let i=0;i<spVerts.count;i++){
    const sv = new THREE.Vector3().fromBufferAttribute(spVerts,i).normalize();
    // Find furthest point in the hull in this direction
    let best=null, bestDot=-Infinity;
    points.forEach(p=>{
      const d=sv.dot(p.clone().normalize())*p.length();
      if(d>bestDot){bestDot=d;best=p;}
    });
    // Project onto that distance
    const dist = best.length()*(.85+.15*sv.dot(best.clone().normalize()));
    positions.push(sv.x*dist, sv.y*dist, sv.z*dist);
    normals.push(sv.x,sv.y,sv.z);
  }

  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('normal',  new THREE.Float32BufferAttribute(normals,3));
  geo.setIndex(sphere.index);
  geo.computeVertexNormals();
  return geo;
}

// ═══════════════════════════════════════════════════════
//  SCENE ASSEMBLY
// ═══════════════════════════════════════════════════════
const group = new THREE.Group();
scene.add(group);

// Particles — floating dust
(function buildDust(){
  const geo=new THREE.BufferGeometry();
  const N=600, pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    pos[i*3]=(Math.random()-.5)*12;
    pos[i*3+1]=(Math.random()-.5)*12;
    pos[i*3+2]=(Math.random()-.5)*6;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({
    color:0xaa88ff,size:.018,transparent:true,opacity:.35,blending:THREE.AdditiveBlending
  })));
})();

// Fragment meshes
const solidArr=[], edgeArr=[], solidMats=[], edgeMats=[], gapMatArr=[];
const fragGroup = new THREE.Group();
group.add(fragGroup);

FRAGS.forEach((f,i)=>{
  const geo = shardGeo(i*7+13, .95);

  const sm  = crystalMat(f.color,f.emit);
  const s   = new THREE.Mesh(geo,sm);
  s.position.copy(f.rest);
  s.rotation.copy(f.rotRest);
  s.userData.fid=i;
  fragGroup.add(s);
  solidArr.push(s); solidMats.push(sm);

  const em  = edgeMat(f.color);
  const e   = new THREE.Mesh(geo.clone(),em);
  e.position.copy(f.rest);
  e.rotation.copy(f.rotRest);
  fragGroup.add(e);
  edgeArr.push(e); edgeMats.push(em);

  // Point light from inside each shard
  const pl = new THREE.PointLight(f.emit,1.8,4.5);
  pl.position.copy(f.rest);
  fragGroup.add(pl);

  // Gap glow planes between this shard and its neighbors
  const nextF = FRAGS[(i+1)%FRAGS.length];
  for(let g=0;g<5;g++){
    const t=(g+.5)/5;
    const gm = gapMat(f.emit, nextF.emit);
    const gp = new THREE.Mesh(new THREE.PlaneGeometry(.8,.8),gm);
    gp.position.lerpVectors(f.rest, nextF.rest, t);
    gp.lookAt(0,0,20);
    fragGroup.add(gp);
    gapMatArr.push(gm);
  }

  // Seam glow — tiny bright planes AT the join line
  const seamMat = gapMat(f.emit, f.emit);
  const seam    = new THREE.Mesh(new THREE.PlaneGeometry(.35,.35),seamMat);
  seam.position.lerpVectors(f.rest, FRAGS[(i+1)%FRAGS.length].rest, .1);
  seam.lookAt(0,0,20);
  fragGroup.add(seam);
  gapMatArr.push(seamMat);
});

// Core radiance orb at center
const orbMat = new THREE.ShaderMaterial({
  uniforms:{time:{value:0}},
  vertexShader:`varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`
    uniform float time; varying vec3 vN;
    void main(){
      float fr=pow(1.0-abs(dot(vN,vec3(0,0,1))),1.2);
      float pu=.5+.5*sin(time*1.0);
      vec3 a=vec3(.8,.5,1.0); vec3 b=vec3(.4,.9,1.0);
      vec3 col=mix(a,b,pu);
      gl_FragColor=vec4(col*fr*2.0,fr*.9);
    }`,
  transparent:true, blending:THREE.AdditiveBlending,
});
fragGroup.add(new THREE.Mesh(new THREE.SphereGeometry(.18,20,20),orbMat));

// Ambient + distant fill
scene.add(new THREE.AmbientLight(0x220033,2));
const fill = new THREE.DirectionalLight(0x8844ff,.8);
fill.position.set(2,4,3);
scene.add(fill);

// ═══════════════════════════════════════════════════════
//  INDEX PANEL
// ═══════════════════════════════════════════════════════
const idxEl = document.getElementById('idx');
FRAGS.forEach((f,i)=>{
  const d=document.createElement('div');
  d.className='ix'+(i===0?' on':'');
  d.innerHTML=`<div class="ix-dot" style="border-color:${f.colorHex}"></div><span class="ix-lbl">${f.num}</span>`;
  d.addEventListener('click',()=>openGallery(i));
  idxEl.appendChild(d);
});
function setIdx(id){
  document.querySelectorAll('.ix').forEach((el,i)=>{
    const on=i===id;
    el.classList.toggle('on',on);
    el.querySelector('.ix-dot').style.background=on?FRAGS[i].colorHex:'transparent';
  });
}

// ═══════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════
const tipEl=document.getElementById('tooltip');
let hov=-1;
function showTip(id,x,y){
  const f=FRAGS[id];
  tipEl.querySelector('.t-num').textContent='[ '+f.num+' ]';
  tipEl.querySelector('.t-num').style.color=f.colorHex;
  tipEl.querySelector('.t-title').textContent=f.title;
  tipEl.style.left=(x+20)+'px'; tipEl.style.top=(y-20)+'px';
  tipEl.style.opacity='1'; tipEl.style.borderColor=f.colorHex+'44';
  curEl.style.borderColor=f.colorHex; curEl.classList.add('hover');
}
function hideTip(){
  tipEl.style.opacity='0';
  curEl.style.borderColor='rgba(220,180,255,.8)'; curEl.classList.remove('hover');
}

// ═══════════════════════════════════════════════════════
//  GALLERY
// ═══════════════════════════════════════════════════════
const galEl  = document.getElementById('gallery');
const gClose = document.getElementById('g-close');
const hintEl = document.getElementById('hint');
let galOpen=false;

function openGallery(id){
  if(galOpen)return;
  galOpen=true;
  hintEl.classList.add('fade');
  const f=FRAGS[id];
  document.getElementById('g-num').textContent='SERIES '+f.num;
  document.getElementById('g-num').style.color=f.colorHex;
  document.getElementById('g-title').textContent=f.title;
  document.getElementById('g-desc').textContent=f.desc;
  document.getElementById('g-tags').innerHTML=f.tags.map(t=>
    `<span class="g-tag" style="border-color:${f.colorHex}44;color:${f.colorHex}">${t}</span>`
  ).join('');
  setIdx(id);
  galEl.classList.add('open');

  // Show image
  const wrap=document.getElementById('art-wrap');
  wrap.innerHTML='';
  const img=document.createElement('img');
  img.className='art-img'; img.alt=f.title;
  const ov=document.createElement('div');
  ov.className='art-overlay'; ov.style.background=f.colorHex;
  wrap.appendChild(img); wrap.appendChild(ov);
  img.addEventListener('load',()=>{ img.classList.add('on'); ov.classList.add('on'); });
  img.src=f.img;
}

function closeGallery(){
  if(!galOpen)return;
  galOpen=false;
  galEl.classList.remove('open');
}

gClose.addEventListener('click',closeGallery);
galEl.addEventListener('click',e=>{ if(e.target===galEl)closeGallery(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeGallery(); });

// ═══════════════════════════════════════════════════════
//  EXPLODE ANIMATION STATE
//  When hovering, that fragment drifts out slightly
// ═══════════════════════════════════════════════════════
const explodeT = new Array(FRAGS.length).fill(0); // 0=rest,1=exploded

function setHov(id,on){
  solidMats[id].uniforms.hover.value=on?1:0;
  edgeMats[id].uniforms.hover.value=on?1:0;
}

// ═══════════════════════════════════════════════════════
//  RAYCASTING
// ═══════════════════════════════════════════════════════
canvas.addEventListener('mousemove',e=>{
  ptr.x=(e.clientX/innerWidth)*2-1;
  ptr.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(ptr,camera);
  const hits=ray.intersectObjects(solidArr);
  if(hits.length){
    const id=hits[0].object.userData.fid;
    if(id!==hov){
      if(hov>=0)setHov(hov,false);
      hov=id; setHov(id,true);
    }
    showTip(id,e.clientX,e.clientY);
  } else {
    if(hov>=0){setHov(hov,false);hov=-1;}
    hideTip();
  }
});
canvas.addEventListener('click',()=>{
  if(hov>=0&&!galOpen)openGallery(hov);
});

// ═══════════════════════════════════════════════════════
//  MAIN RENDER LOOP
// ═══════════════════════════════════════════════════════
let camX=0,camY=0;
document.addEventListener('mousemove',e=>{
  camX=(e.clientX/innerWidth-.5)*1.4;
  camY=(e.clientY/innerHeight-.5)*.9;
});

function lerp(a,b,t){ return a+(b-a)*t; }

function animate(ts){
  requestAnimationFrame(animate);
  const time=ts*.001;

  // Camera parallax
  camera.position.x+=( camX*.5-camera.position.x)*.04;
  camera.position.y+=(-camY*.35-camera.position.y)*.04;
  camera.lookAt(0,0,0);

  // Whole ore slow rotation + breathing
  fragGroup.rotation.y = time*.08;
  fragGroup.rotation.x = Math.sin(time*.11)*.06;
  const breathe = 1+Math.sin(time*.6)*.025;
  fragGroup.scale.setScalar(breathe);

  // Orbit each fragment, plus hover explode
  orbMat.uniforms.time.value=time;

  FRAGS.forEach((f,i)=>{
    const s=solidArr[i], e=edgeArr[i];

    // Explode target: hovered → drift outward
    const targetExplode = (hov===i) ? 1 : 0;
    explodeT[i] = lerp(explodeT[i], targetExplode, .06);

    const restPos = f.rest.clone();
    const exPos   = f.explode.clone();
    // Interpolate between rest and explode
    const pos = restPos.lerp(exPos, explodeT[i]*.15);
    // Add float
    pos.y += Math.sin(time*.7+i*1.1)*.06;

    s.position.copy(pos);
    e.position.copy(pos);

    // Gentle spin
    s.rotation.x = f.rotRest.x + time*(.12+i*.02);
    s.rotation.y = f.rotRest.y + time*(.18+i*.025);
    e.rotation.copy(s.rotation);

    solidMats[i].uniforms.time.value=time;
    solidMats[i].uniforms.explodeT.value=explodeT[i];
    edgeMats[i].uniforms.time.value=time;
    edgeMats[i].uniforms.explodeT.value=explodeT[i];
  });

  gapMatArr.forEach(gm=>{ if(gm.uniforms.time)gm.uniforms.time.value=time; });

  renderer.render(scene,camera);
}
animate(0);

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
